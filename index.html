  <style>
    html, body { background: #000; }
    html.light, html.light body { background: #fff; }
  </style>
  <script>
    // set theme before paint to prevent flash; respect OS preference on first visit
    (function () {
      try {
        var stored = localStorage.getItem('ws:theme');
        var light = stored ? stored === 'light'
          : window.matchMedia('(prefers-color-scheme: light)').matches;
        if (light) document.documentElement.classList.add('light');
      } catch (e) {}
    })();
  </script>
